<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Plan My Yatra – Airplane + Route + Pins Travel Logo -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A73E8"/>
      <stop offset="50%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#FF9933"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF9933"/>
      <stop offset="100%" stop-color="#C84B00"/>
    </linearGradient>
    <linearGradient id="planeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <filter id="softglow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="rgba(255,153,51,0.6)"/>
    </filter>
  </defs>

  <!-- Sky background (top half) -->
  <circle cx="50" cy="50" r="48" fill="url(#sky)"/>

  <!-- Ground / earth strip (bottom) -->
  <path d="M7 68 Q50 60 93 68 L96 80 Q50 90 4 80 Z" fill="url(#ground)"/>
  <!-- Ground grass layer -->
  <path d="M7 68 Q50 62 93 68 Q50 72 7 68 Z" fill="#4CAF50" opacity="0.6"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  <!-- Clouds -->
  <g fill="white" opacity="0.75">
    <!-- Cloud 1 left -->
    <ellipse cx="18" cy="30" rx="7" ry="4"/>
    <ellipse cx="13" cy="32" rx="5" ry="3.5"/>
    <ellipse cx="23" cy="32" rx="5" ry="3.5"/>
    <!-- Cloud 2 right -->
    <ellipse cx="78" cy="22" rx="6" ry="3.5"/>
    <ellipse cx="73" cy="24" rx="4.5" ry="3"/>
    <ellipse cx="83" cy="24" rx="4.5" ry="3"/>
  </g>

  <!-- Dotted flight path arc from bottom-left to top-right -->
  <path d="M22 72 Q30 20 80 18" fill="none" stroke="rgba(255,255,255,0.6)"
        stroke-width="1.8" stroke-dasharray="4,3" stroke-linecap="round"/>

  <!-- START pin – bottom left -->
  <g filter="url(#softglow)">
    <path d="M22 68 C19.2 68 17 70.2 17 73 C17 75.8 22 82 22 82 C22 82 27 75.8 27 73 C27 70.2 24.8 68 22 68Z"
          fill="#FF9933" stroke="white" stroke-width="1.2"/>
    <circle cx="22" cy="73" r="2.5" fill="white"/>
  </g>

  <!-- END pin – top right -->
  <g filter="url(#softglow)">
    <path d="M80 12 C77.2 12 75 14.2 75 17 C75 19.8 80 26 80 26 C80 26 85 19.8 85 17 C85 14.2 82.8 12 80 12Z"
          fill="#FF9933" stroke="white" stroke-width="1.2"/>
    <circle cx="80" cy="17" r="2.5" fill="white"/>
  </g>

  <!-- ✈ AIRPLANE – main element, flying along the path at midpoint, tilted 45° NE -->
  <g transform="translate(50,42) rotate(-40)" filter="url(#glow)">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="13" ry="3.5" fill="url(#planeGrad)"/>
    <!-- Nose cone -->
    <path d="M13 0 Q18 0 16 2 Q14 3.5 13 3.5 Z" fill="url(#planeGrad)"/>
    <!-- Tail fin -->
    <path d="M-13 0 L-16 -6 L-10 -1 Z" fill="white" opacity="0.9"/>
    <path d="M-13 0 L-16 6 L-10 1 Z" fill="white" opacity="0.7"/>
    <!-- Main wings -->
    <path d="M-3 0 L-8 -12 L8 -4 Z" fill="white"/>
    <path d="M-3 0 L-8 12 L8 4 Z" fill="white" opacity="0.9"/>
    <!-- Small rear stabilisers -->
    <path d="M-11 -0.5 L-14 -5 L-8 -1 Z" fill="rgba(255,255,255,0.8)"/>
    <path d="M-11 0.5 L-14 5 L-8 1 Z" fill="rgba(255,255,255,0.7)"/>
    <!-- Window strip -->
    <rect x="-2" y="-2" width="10" height="4" rx="2" fill="rgba(100,181,246,0.6)"/>
    <!-- Individual windows -->
    <circle cx="0" cy="0" r="1.1" fill="rgba(200,235,255,0.9)"/>
    <circle cx="3" cy="0" r="1.1" fill="rgba(200,235,255,0.9)"/>
    <circle cx="6" cy="0" r="1.1" fill="rgba(200,235,255,0.9)"/>
    <!-- Saffron stripe on fuselage -->
    <rect x="-9" y="-0.8" width="20" height="1.6" rx="0.8" fill="#FF9933" opacity="0.7"/>
  </g>

  <!-- Stars in sky -->
  <circle cx="35" cy="18" r="1" fill="white" opacity="0.6"/>
  <circle cx="60" cy="10" r="0.9" fill="white" opacity="0.5"/>
  <circle cx="88" cy="38" r="1" fill="white" opacity="0.4"/>
  <circle cx="10" cy="48" r="0.8" fill="white" opacity="0.4"/>
</svg>
